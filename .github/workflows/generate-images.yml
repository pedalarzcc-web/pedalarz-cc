name: Generate images.json

on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate images.json
        run: |
          cd images
          printf "%s\n" *.jpg *.jpeg *.png *.webp *.gif 2>/dev/null \
            | xargs -I{} stat -c "%Y %n" {} \
            | sort -nr \
            | cut -d' ' -f2- \
            | jq -R . | jq -s . > images.json

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/images.json
          git commit -m "Auto-update images.json" || echo "No changes"
          git push
