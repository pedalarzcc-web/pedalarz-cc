name: Generate images.json

on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # CRITICAL: Fetches full history so timestamps exist

      - name: Generate images.json
        run: |
          cd images
          git ls-files *.jpg *.jpeg *.png *.webp *.gif \
            | while read file; do
                # Get the timestamp of the commit where the file was Added (A)
                # 'tail -1' ensures we get the oldest creation date if added multiple times
                TIMESTAMP=$(git log --diff-filter=A --format="%ct" -- "$file" | tail -1)
                
                # Fallback to current time just in case a file has no commit history yet
                if [ -z "$TIMESTAMP" ]; then 
                  TIMESTAMP=$(date +%s)
                fi
                
                echo "$TIMESTAMP $file";
              done \
            | sort -nr \
            | awk '{print $2}' \
            | jq -R . | jq -s . > images.json

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/images.json
          git commit -m "Auto-update images.json" || echo "No changes"
          git push
