<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        #gallery img {
            width: 100%;
            max-width: 600px;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: #555;
        }
        #info {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #continueBtn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div id="info">
    <h2>Informacja</h2>
    <p>Ta strona prowadzi do innej witryny. Z treściami przeznaczonymi dla osób dorosłych (18+)</p>
    <a id="continueBtn">Kontynuuj</a>

    <p style="margin-top:20px;">
        Jeśli nie chcesz przechodzić dalej, zapraszam do obejrzenia memów z łódzkiego podwórka.
    </p>
</div>

<h2>Galeria</h2>

<div id="gallery" style="min-height: 100vh;"></div>

<div id="loading">Ładowanie...</div>

<script>
document.getElementById("continueBtn").addEventListener("click", () => {
    window.location.href = "https://gayporn.com";
});

let images = [];
let index = 0;
const batchSize = 10;

async function loadImagesList() {
    const response = await fetch('images/images.json');
    images = await response.json();

    images.sort((a, b) => {
        const na = parseInt(a);
        const nb = parseInt(b);
        return na - nb;
    });

    loadNextBatch();
}

function loadNextBatch() {
    const gallery = document.getElementById('gallery');

    const nextImages = images.slice(index, index + batchSize);
    nextImages.forEach(file => {
        const img = document.createElement('img');
        img.loading = "lazy";
        img.src = 'images/' + file;
        gallery.appendChild(img);
    });

    index += batchSize;

    if (index >= images.length) {
        document.getElementById('loading').innerText = "Koniec";
        observer.disconnect();
    }
}

const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
        loadNextBatch();
    }
}, {
    rootMargin: "300px"
});

observer.observe(document.getElementById('loading'));

loadImagesList();
</script>

</body>
</html>
