<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>

    <style>
        :root {
            --bg: #f5f5f5;
            --text: #000;
            --card-bg: #fff;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark {
            --bg: #121212;
            --text: #e5e5e5;
            --card-bg: #1e1e1e;
            --shadow: rgba(255,255,255,0.05);
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        #themeToggle {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 10px 15px;
            background: var(--card-bg);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--shadow);
            z-index: 9999;
            border: none;
        }

        #gallery img {
            width: 100%;
            max-width: 600px;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--shadow);
        }

        #loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: var(--text);
        }

        #info {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin: 0 auto 30px auto;
            box-shadow: 0 0 10px var(--shadow);
            max-width: 600px;
            text-align: center;
        }

        #continueBtn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }

        #sentinel {
            height: 1px;
        }
    </style>
</head>
<body>

<button id="themeToggle">🌙 Tryb ciemny</button>

<div id="info">
    <h2>Informacja</h2>
    <p>Ta strona prowadzi do innej witryny.<br> Z treściami przeznaczonymi dla osób dorosłych (18+)</p>
    <a id="continueBtn">Kontynuuj</a>

    <p style="margin-top:20px;">
        Jeśli nie chcesz przechodzić dalej, zapraszam do obejrzenia memów z łódzkiego podwórka.
    </p>
</div>

<h2 style="text-align:center;">Galeria</h2>

<div id="gallery"></div>

<div id="sentinel"></div>

<div id="loading">Ładowanie...</div>

<script>
const body = document.body;
const toggleBtn = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "dark" ||
   (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
    body.classList.add("dark");
    toggleBtn.textContent = "☀️ Tryb jasny";
}

toggleBtn.addEventListener("click", () => {
    body.classList.toggle("dark");
    const isDark = body.classList.contains("dark");
    toggleBtn.textContent = isDark ? "☀️ Tryb jasny" : "🌙 Tryb ciemny";
    localStorage.setItem("theme", isDark ? "dark" : "light");
});

document.getElementById("continueBtn").addEventListener("click", () => {
    window.location.href = "https://gayporn.com";
});

let images = [];
let index = 0;
const batchSize = 10;

async function loadImagesList() {
    const response = await fetch('images/images.json');
    images = await response.json();

    images.sort((a, b) => parseInt(a) - parseInt(b));

    loadNextBatch();
}

function loadNextBatch() {
    const gallery = document.getElementById('gallery');

    const nextImages = images.slice(index, index + batchSize);
    nextImages.forEach(file => {
        const img = document.createElement('img');
        img.loading = "lazy";
        img.src = 'images/' + file;
        gallery.appendChild(img);
    });

    index += batchSize;

    if (index >= images.length) {
        document.getElementById('loading').innerText = "Koniec";
        observer.disconnect();
    }
}

const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
        loadNextBatch();
    }
}, {
    rootMargin: "200px"
});

observer.observe(document.getElementById('sentinel'));

loadImagesList();
</script>

</body>
</html>
